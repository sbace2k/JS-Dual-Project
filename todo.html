<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="./Styles/global.css"/>
  <link rel="stylesheet" href="./Styles/todo.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <title>Taskr Todo App</title>  
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
        <div class="logo">JS-<span id="text"></span></div>

        <div class="navbar-right">
            <div class="user">
                <span>danieluma15</span>
                <i class="fa-solid fa-rotate-right"></i>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </div>
            <button id="theme-switch" class="theme-button">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
            </button>
        </div>
  </div>

  <!-- HERO -->
  <section class="hero">
        <div class="hero-content">
        <div class="date" id="headerDate">FRIDAY, MAY 22</div>
        <h1 id="headerTitle">0 tasks left.</h1>
        </div>
  </section>

  <!-- TASK AREA -->
  <div class="task-container">

        <div class="input-group">
        <input type="text" placeholder="Add a new task..." class="task-input" id="taskInput"/>
        <button class="add-btn" id="addBtn">+ Add</button>
        </div>

        <!-- FILTERS -->
        <div class="filters">
        <div class="filter active-filter">All 0</div>
        <div class="filter">Active 0</div>
        <div class="filter">Completed 0</div>
        <div class="filter-slider"></div>
        </div>

        <!-- EMPTY -->
        <div class="empty-section" id="taskList">
        <div class="circle">
            <div class="inner-circle"></div>
        </div>

        <p>Add your first task above</p>
        </div>
  </div>
  <script src="./Scripts/global.js"></script>
  <script src="./Scripts/todo.js"></script>

</body>
</html>
