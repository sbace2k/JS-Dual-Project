<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="../Styles/global.css"/>
    <link rel="stylesheet" href="../Styles/calculator.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">JS-<span id="text"></span></div>

        <div class="right">
            <a href="first-page.html">Back ↩</a>
            <button id="theme-switch" class="theme-button">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg> 
            </button>
        </div>
    </div>
    <main>
        <div class="calculator">
            <input type="text" placeholder="0" id="inputBox">
            <button id="scientific-toggle" class="scientific-toggle" data-action="toggle-scientific">Show more ▼</button>
            <div class="butcon scientific-section collapsed" id="scientific-section">
                <button class="log" data-value="sin">sin</button>
                <button class="log" data-value="cos">cos</button>
                <button class="log" data-value="tan">tan</button>
                <button class="opr" data-value="π">π</button>

                <button class="log" data-value="asin">asin</button>
                <button class="log" data-value="acos">acos</button>
                <button class="log" data-value="atan">atan</button>
                <button class="opr" data-value="e">e</button>

                <button class="log" data-value="log">log</button>
                <button class="log" data-value="ln">ln</button>
                <button class="log" data-value="|x|">|x|</button>
                <button class="opr" data-value="e^x">e<sup>x</sup></button>
                
                <button class="log" data-value="x^-1">x<sup>-1</sup></button>
                <button class="log" data-value="x^2">x<sup>2</sup></button>
                <button class="log" data-value="x^3">x<sup>3</sup></button>
                <button class="log" data-value="x^y">x<sup>y</sup></button>

                <button class="log" data-value="√x">√x</button>
                <button class="log" data-value="10^x">10<sup>x</sup></button>
                <button class="log" data-value="∛x">∛x</button>
                <button class="log" data-value="y√x"><sup>y</sup>√x</button>

                <button class="log" data-value="x!">x!</button>
                <button class="log" data-value="(">(</button>
                <button class="log" data-value=")">)</button>
                <button class="log" data-value="%">%</button>
                
            </div>
            <div class="butcon">
                <button class="log" data-action="delete"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m456-320 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 160q-19 0-36-8.5T296-192L80-480l216-288q11-15 28-23.5t36-8.5h440q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H360ZM180-480l180 240h440v-480H360L180-480Zm400 0Z"/></svg></button>
                <button class="log" data-value="AC">AC</button>
                <button class="log" data-value="±"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" height="24px" width="24px" fill="#e3e3e3"><path d="M352 96C352 78.3 337.7 64 320 64C302.3 64 288 78.3 288 96L288 224L160 224C142.3 224 128 238.3 128 256C128 273.7 142.3 288 160 288L288 288L288 416C288 433.7 302.3 448 320 448C337.7 448 352 433.7 352 416L352 288L480 288C497.7 288 512 273.7 512 256C512 238.3 497.7 224 480 224L352 224L352 96zM128 544C128 561.7 142.3 576 160 576L480 576C497.7 576 512 561.7 512 544C512 526.3 497.7 512 480 512L160 512C142.3 512 128 526.3 128 544z"/></svg></button>
                <button class="opr" data-value="÷">÷</button>

                <button data-value="7">7</button>
                <button data-value="8">8</button>
                <button data-value="9">9</button>
                <button class="opr" data-value="×">×</button>

                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button class="opr" data-value="-">-</button>

                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="3">3</button>
                <button class="opr" data-value="+">+</button>

                <button data-value="0">0</button>
                <button data-value="00">00</button>
                <button data-value=".">.</button>
                <button class="eqbtn" data-value="=">=</button>
            </div>
        </div>
    </main>
    

    <script src="../Scripts/global.js"></script>
    <script src="../Scripts/calculator.js"></script>
</body>
</html>
